<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <title>Online Courses</title>
    <style>
        * {
            box-sizing: border-box;
        }

        .container {
            display: flex;
            justify-content: space-between;
        }

        .container div {
            margin: 0 20px;
            padding: 10px;
            border: dotted black;
            width: calc((100% - 80px) / 3);
        }

        h1 {
            text-align: center;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
        }

        /* Table styles */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        tr:hover {
            background-color: #ddd;
        }

        /* Heading styles */
        h2 {
            color: #333;
            margin-top: 30px;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }

        /* Strong text styles */
        strong {
            color: #4CAF50;
        }

        /* Logout button styling */
        a.logout-btn {
            display: block;
            width: max-content;
            padding: 10px 20px;
            background-color: #e74c3c;
            color: white;
            font-weight: bold;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s ease, transform 0.3s ease;
            margin: 20px auto;
            text-align: center;
        }

        a.logout-btn:hover {
            background-color: #c0392b;
            transform: scale(1.1);
        }

        a.logout-btn:active {
            background-color: #b03a2e;
            transform: scale(1);
        }
    </style>
</head>
<body>

<h1>Welcome to Online Courses Info, Teacher</h1>
<a th:href="@{/logout}" class="logout-btn">Logout</a>


<div class="container">
    <div>
        <h2>Student List</h2>
        <ul>
            <li th:each="student : ${students}">
                <span th:text="${student.name}">Name</span> -
                <span th:text="${student.age}">Age</span>
            </li>
        </ul>
        <div>
            <h2>Download Files</h2>
            <a href="/download/students.txt" class="btn btn-primary">Download TXT File</a>
            <a href="/download/students.xml" class="btn btn-primary">Download XML File</a>
        </div>
        <h2>Filtered students</h2>
        <form action="/teacher/home" method="get">
            <label for="keyword">Filter by keyword:</label>
            <input type="text" id="keyword" name="keyword" placeholder="Enter a keyword">
            <button type="submit">Filter</button>
        </form>
        <ul>
            <li th:each="student : ${filtered_students}">
                <span th:text="${student.name}">Name</span> -
                <span th:text="${student.age}">Age</span>
            </li>
        </ul>

    </div>

    <div>
        <h2>Enrollments</h2>
        <table>
            <thead>
            <tr>
                <th>Student</th>
                <th>Course</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="enrollment : ${enrollmentInfo}">
                <td th:text="${enrollment.getKey()}"></td>
                <td th:text="${enrollment.getValue()}"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <div>
        <h2>Exam</h2>
        <table>
            <thead>
            <tr>
                <th>Subject</th>
                <th>Date</th>
                <th>Max Score</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="exam : ${exams}">
                <td><span th:text="${exam.subject}"></span></td>
                <td><span th:text="${exam.date}"></span></td>
                <td><span th:text="${exam.maxScore}"></span></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
